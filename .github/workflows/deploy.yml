name: Deploy to Cloudflare

# Deploy the Worker on every push to main. Works for any contributor —
# no local wrangler/auth needed; CI authenticates with the repo secrets below.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Avoid overlapping deploys; cancel an in-progress run if a newer push arrives.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build the client bundle into ./public before wrangler uploads assets.
      # (public/client.js is gitignored build output, so it must be produced in CI.)
      - run: npm run build:client

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
